server {
    listen 80;
    server_name 898802.xyz www.898802.xyz;

    # Cloudflare handles HTTPS — accept CF's Flexible SSL on port 80
    # But we should restrict to Cloudflare IPs in production
    # set_real_ip_from 173.245.48.0/20;  # Cloudflare IP ranges
    # real_ip_header CF-Connecting-IP;

    client_max_body_size 1m;
    # Increase proxy timeout for long synthesis requests (up to 120s)
    proxy_read_timeout 120s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
